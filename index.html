<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Supervisor - Clube da Psicanálise</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #video-container { width: 100%; max-width: 800px; height: 450px; background-color: #000; border-radius: 12px; border: 2px solid #d4af37; overflow: hidden; margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { display: flex; gap: 10px; width: 100%; max-width: 800px; }
        input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #475569; background: #1e293b; color: white; }
        button { padding: 12px 24px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        #btn-iniciar { background-color: #d4af37; color: #0f172a; }
        #btn-enviar { background-color: #3b82f6; color: white; }
    </style>
</head>
<body>
    <div id="video-container"><video id="avatar-video" autoplay playsinline></video></div>
    <div class="controls">
        <button id="btn-iniciar">Iniciar Supervisor</button>
        <input type="text" id="input-fala" placeholder="Apresente o caso clínico..." disabled>
        <button id="btn-enviar" disabled>Enviar</button>
    </div>

    <script>
        // As suas chaves já estão configuradas aqui!
        const API_KEY = "899515d4-613f-11f1-8d28-066a7fa2e369"; 
        const AVATAR_ID = "513fd1b7-7ef9-466d-9af2-344e51eeb833"; 
        const VOICE_ID = "2f15f3df27e643029f0ff69957d08f5d";

        const btnIniciar = document.getElementById('btn-iniciar');
        const inputFala = document.getElementById('input-fala');
        const btnEnviar = document.getElementById('btn-enviar');
        const videoElem = document.getElementById('avatar-video');
        let session;

        btnIniciar.addEventListener('click', async () => {
            btnIniciar.innerText = "A ligar motores...";
            btnIniciar.disabled = true;
            
            try {
                // A SOLUÇÃO: Importação dinâmica para driblar a segurança do Wix
                const HeyGenModulo = await import('https://esm.sh/@heygen/liveavatar-web-sdk');
                const LiveAvatarSession = HeyGenModulo.LiveAvatarSession;

                btnIniciar.innerText = "A conectar ao servidor...";
                const res = await fetch('https://api.liveavatar.com/v1/sessions/token', {
                    method: 'POST',
                    headers: { 'X-Api-Key': API_KEY.trim(), 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        mode: "LITE",
                        avatar_id: AVATAR_ID,
                        voice_id: VOICE_ID
                    })
                });
                
                const responseData = await res.json();
                const tokenReal = responseData?.data?.session_token || responseData?.data?.token;

                if (!tokenReal) {
                    throw new Error("Erro de servidor: " + JSON.stringify(responseData));
                }

                btnIniciar.innerText = "A gerar sala de vídeo...";
                session = new LiveAvatarSession(tokenReal);
                
                session.on("session_stream_ready", (event) => {
                    videoElem.srcObject = event.detail;
                });

                await session.start({ 
                    avatar_id: AVATAR_ID,
                    voice_id: VOICE_ID
                });
                
                btnIniciar.innerText = "Supervisor Online";
                inputFala.disabled = false;
                btnEnviar.disabled = false;

            } catch (err) {
                alert("Falha técnica: " + err.message);
                btnIniciar.innerText = "Tentar Novamente";
                btnIniciar.disabled = false;
            }
        });

        btnEnviar.addEventListener('click', async () => {
            const texto = inputFala.value;
            if(!texto || !session) return;
            
            inputFala.value = "";
            btnEnviar.disabled = true;
            
            await session.speak({ text: texto });
            
            btnEnviar.disabled = false;
        });
    </script>
</body>
</html>
